---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sre-app-ingress
  namespace: default
  labels:
    app: sre-app
    team: sre
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: sre-app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sre-app-service
                port:
                  number: 80
          - path: /health
            pathType: Exact
            backend:
              service:
                name: sre-app-service
                port:
                  number: 80
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: sre-app-service
                port:
                  number: 80
