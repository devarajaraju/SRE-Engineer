---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-app
  namespace: default
  labels:
    app: sre-app
    team: sre
    version: "1.0.0"
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "SRE Flask health check API"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sre-app
        version: "1.0.0"
    spec:
      containers:
        - name: sre-app
          image: sre-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: sre-app-config
          env:
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: sre-app-config
                  key: APP_VERSION
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
      restartPolicy: Always
